# Example multi-project Symphony config. Replace these placeholder values with
# your own Linear project slugs, repo sources, workflow paths, and workspace roots.
tracker:
  kind: linear
  endpoint: https://api.linear.app/graphql
  api_key: $LINEAR_API_KEY
  active_states:
    - Todo
    - In Progress
    - Merging
    - Rework
  terminal_states:
    - Closed
    - Cancelled
    - Canceled
    - Duplicate
    - Done

polling:
  interval_ms: 5000

workspace:
  root: ~/work/symphony-workspaces

instance:
  name: local-dev

server:
  port: 4000

agent:
  backend: codex
  default_effort: medium
  max_concurrent_agents: 10
  max_turns: 20

codex:
  command: codex --config shell_environment_policy.inherit=all --config model_reasoning_effort=medium --model gpt-5.4 app-server
  approval_policy: never
  thread_sandbox: danger-full-access
  turn_sandbox_policy:
    type: dangerFullAccess

claude:
  command: claude
  permission_mode: bypassPermissions
  turn_sandbox_policy:
    type: dangerFullAccess

opencode:
  command: opencode serve --hostname 127.0.0.1 --port 0
  agent: build

telemetry:
  enabled: false
  # otlp_endpoint: http://localhost:11338
  # otlp_protocol: grpc
  # include_traces: true
  # include_metrics: true
  # include_logs: true
  # resource_attributes:
  #   environment: local-dev

projects:
  - linear_project: project-a
    repo: your-org/project-a
    workflow: WORKFLOW.md
    workspace_root: ~/work/symphony-workspaces/project-a
    backend: codex

  - linear_project: project-b
    repo: your-org/project-b
    workflow: WORKFLOW.md
    default_branch: main
    workspace_root: ~/work/symphony-workspaces/project-b
    backend: claude
