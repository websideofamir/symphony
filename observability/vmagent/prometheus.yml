global:
  scrape_interval: 5s

scrape_configs:
  - job_name: agent-local
    file_sd_configs:
      - files:
          - /etc/vmagent/targets/*.yml

  - job_name: vector
    static_configs:
      - targets:
          - vector:9598

  - job_name: symphony
    static_configs:
      - targets:
          - host.docker.internal:4001
        labels:
          service: symphony

  - job_name: victoriatraces
    static_configs:
      - targets:
          - victoriatraces:10428

  - job_name: victoriametrics
    static_configs:
      - targets:
          - victoriametrics:8428
